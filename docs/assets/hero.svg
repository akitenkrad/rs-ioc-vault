<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="rs-ioc-vault — OSINT Indicator-of-Compromise store in Rust">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#111a33"/>
      <stop offset="1" stop-color="#1b2550"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="20" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#2a3a66" stroke-width="1" opacity="0.35">
    <line x1="0" y1="90" x2="1280" y2="90"/>
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="270" x2="1280" y2="270"/>
  </g>

  <!-- accent bar -->
  <rect x="64" y="78" width="86" height="8" rx="4" fill="url(#accent)"/>

  <!-- title -->
  <text x="62" y="158" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="76" font-weight="800" fill="#f8fafc">rs-ioc-vault</text>
  <text x="66" y="206" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="500" fill="#cbd5e1">OSINT Indicator-of-Compromise (IoC) store in Rust</text>

  <!-- mono strip -->
  <text x="66" y="250" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="18" fill="#7dd3fc">single binary · single SQLite file · WAL + FTS5 · STIX 2.1 / MISP</text>

  <!-- pipeline -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" font-weight="600">
    <!-- node: feeds -->
    <rect x="66" y="288" width="196" height="44" rx="22" fill="#13203f" stroke="#334876" stroke-width="1.5"/>
    <text x="164" y="316" text-anchor="middle" fill="#e2e8f0">OSINT feeds</text>

    <!-- arrow -->
    <path d="M270 310 H338" stroke="url(#accent)" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <!-- node: vault -->
    <rect x="346" y="282" width="176" height="56" rx="14" fill="#1c2b52" stroke="url(#accent)" stroke-width="2"/>
    <g transform="translate(366,300)" fill="#7dd3fc">
      <ellipse cx="9" cy="2" rx="9" ry="4"/>
      <path d="M0 2 V14 a9 4 0 0 0 18 0 V2" fill="none" stroke="#7dd3fc" stroke-width="2"/>
      <line x1="0" y1="8" x2="0" y2="8"/>
    </g>
    <text x="446" y="316" text-anchor="middle" fill="#f8fafc">ioc-vault</text>

    <!-- arrow -->
    <path d="M530 310 H598" stroke="url(#accent)" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

    <!-- node: consumers -->
    <rect x="606" y="288" width="320" height="44" rx="22" fill="#13203f" stroke="#334876" stroke-width="1.5"/>
    <text x="766" y="316" text-anchor="middle" fill="#e2e8f0">search · enrich · STIX / MISP / CSV</text>
  </g>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- decorative shield glow -->
  <g transform="translate(1080,60)" opacity="0.9">
    <path d="M90 0 L170 30 V120 C170 175 130 210 90 230 C50 210 10 175 10 120 V30 Z" fill="#1c2b52" stroke="url(#accent)" stroke-width="3"/>
    <path d="M90 0 L170 30 V120 C170 175 130 210 90 230 C50 210 10 175 10 120 V30 Z" fill="url(#accent)" opacity="0.10" filter="url(#soft)"/>
    <path d="M58 118 L82 144 L126 92" fill="none" stroke="#7dd3fc" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
